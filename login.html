<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Haba Perfumes — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── LOGIN PAGE ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,
          rgba(255,255,255,0.07) 0%, transparent 60%),
        #0E0E12;
      padding: 24px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
    }

    /* Logo */
    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .auth-logo h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: #E8E8F0;
    }

    .auth-logo p {
      font-size: 0.65rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: #8A8A98;
      margin-top: 4px;
    }

    /* Card */
    .auth-card {
      padding: 40px 32px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-full);
      padding: 4px;
      margin-bottom: var(--space-xl);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition-smooth);
      border: none;
      background: transparent;
      color: #8A8A98;
      text-align: center;
    }

    .auth-tab.active {
      background: linear-gradient(135deg, #FFFFFF, #E8E8F0);
      color: #0E0E12;
      font-weight: 700;
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-field {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.63rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8A8A98;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-full);
      color: #E8E8F0;
      font-family: var(--font-body);
      font-size: 0.82rem;
      outline: none;
      transition: var(--transition-smooth);
    }

    .form-input:focus {
      border-color: rgba(255,255,255,0.40);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    .form-input::placeholder {
      color: rgba(200,188,160,0.35);
    }

    /* Error */
    .auth-error {
      font-size: 0.72rem;
      color: #ff6b6b;
      text-align: center;
      margin-bottom: 14px;
      padding: 10px;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.18);
      border-radius: var(--radius-md);
      display: none;
    }

    .auth-error.visible { display: block; }

    /* Success */
    .auth-success {
      font-size: 0.72rem;
      color: #4ecb9e;
      text-align: center;
      margin-bottom: 14px;
      padding: 10px;
      background: rgba(40,180,120,0.08);
      border: 1px solid rgba(40,180,120,0.18);
      border-radius: var(--radius-md);
      display: none;
    }

    .auth-success.visible { display: block; }

    /* Submit Button */
    .auth-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #FFFFFF, #E8E8F0);
      border: none;
      border-radius: var(--radius-full);
      color: #0E0E12;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: 0 4px 20px rgba(255,255,255,0.14);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .auth-btn:hover { transform: scale(0.98); }

    .auth-btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .auth-divider span {
      font-size: 0.65rem;
      color: #8A8A98;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Google Button */
    .google-btn {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-full);
      color: #E8E8F0;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .google-btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(201,168,76,0.35);
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    /* Loading Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0E0E12;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Back Link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: var(--space-lg);
      font-size: 0.70rem;
      color: #8A8A98;
      letter-spacing: 0.10em;
      text-decoration: none;
      transition: var(--transition-fast);
    }

    .back-link:hover { color: #E8E8F0; }

    /* Terms */
    .terms-text {
      font-size: 0.62rem;
      color: #8A8A98;
      text-align: center;
      margin-top: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="auth-wrap">

    <!-- Logo -->
    <div class="auth-logo fade-up">
      <h1>HABA</h1>
      <p>Perfumes · Premium Collection</p>
    </div>

    <!-- Card -->
    <div class="auth-card fade-up fade-up-delay-1">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin"
          onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tabSignup"
          onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Error / Success -->
      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <!-- ── LOGIN FORM ── -->
      <div class="auth-form active" id="formLogin">

        <!-- Google -->
        <button class="google-btn" id="googleLoginBtn">
          <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20H24v8h11.1C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8H6.5C9.8 37.6 16.4 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.1c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C40.8 35.4 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider"><span>or sign in with email</span></div>

        <div class="form-field">
          <label class="form-label">Email</label>
          <input type="email" class="form-input"
            id="loginEmail" placeholder="your@email.com" />
        </div>
        <div class="form-field">
          <label class="form-label">Password</label>
          <input type="password" class="form-input"
            id="loginPassword" placeholder="••••••••" />
        </div>

        <button class="auth-btn" id="loginBtn">
          <div class="spinner" id="loginSpinner"></div>
          <span id="loginBtnText">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Sign In
          </span>
        </button>

      </div>

      <!-- ── SIGNUP FORM ── -->
      <div class="auth-form" id="formSignup">

        <!-- Google -->
        <button class="google-btn" id="googleSignupBtn">
          <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20H24v8h11.1C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8H6.5C9.8 37.6 16.4 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.1c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C40.8 35.4 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Sign up with Google
        </button>

        <div class="auth-divider"><span>or create with email</span></div>

        <div class="form-field">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input"
            id="signupName" placeholder="Your full name" />
        </div>
        <div class="form-field">
          <label class="form-label">Email</label>
          <input type="email" class="form-input"
            id="signupEmail" placeholder="your@email.com" />
        </div>
        <div class="form-field">
          <label class="form-label">Password</label>
          <input type="password" class="form-input"
            id="signupPassword" placeholder="Min 6 characters" />
        </div>

        <button class="auth-btn" id="signupBtn">
          <div class="spinner" id="signupSpinner"></div>
          <span id="signupBtnText">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
          </span>
        </button>

        <p class="terms-text">
          By creating an account you agree to our
          <span style="color:#8A8A98;">Terms of Service</span>
          and
          <span style="color:#8A8A98;">Privacy Policy</span>
        </p>

      </div>

    </div>

    <a href="index.html" class="back-link">
      ← Back to Haba Perfumes
    </a>

  </div>

  <script type="module">
    import {
      auth, provider,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged,
      updateProfile,
      db, doc, setDoc, getDoc
    } from './js/firebase.js';

    // ── Redirect if already logged in ──
    onAuthStateChanged(auth, user => {
      if (user) {
        const redirect = sessionStorage.getItem('authRedirect') || 'index.html';
        sessionStorage.removeItem('authRedirect');
        window.location.href = redirect;
      }
    });

    // ── Handle Google redirect result (mobile Safari) ──
    getRedirectResult(auth).then(async result => {
      if (result && result.user) {
        await saveUserToFirestore(result.user);
        showSuccess('Welcome! Redirecting...');
      }
    }).catch(err => {
      if (err && err.code && err.code !== 'auth/null-user') {
        showError('Google sign in failed. Please try again.');
      }
    });

    // ── Tab Switch ──
    window.switchTab = function(tab) {
      document.getElementById('formLogin').classList.toggle('active', tab === 'login');
      document.getElementById('formSignup').classList.toggle('active', tab === 'signup');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      clearMessages();
    };

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = '✕ ' + msg;
      el.classList.add('visible');
      document.getElementById('authSuccess').classList.remove('visible');
    }

    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      el.textContent = '✓ ' + msg;
      el.classList.add('visible');
      document.getElementById('authError').classList.remove('visible');
    }

    function clearMessages() {
      document.getElementById('authError').classList.remove('visible');
      document.getElementById('authSuccess').classList.remove('visible');
    }

    function setLoading(btn, spinner, text, loading) {
      btn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      text.style.display = loading ? 'none' : 'flex';
    }

    // ── Save user to Firestore ──
    async function saveUserToFirestore(user, name = '') {
      const userRef = doc(db, 'users', user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        await setDoc(userRef, {
          uid:       user.uid,
          name:      name || user.displayName || 'Haba Customer',
          email:     user.email,
          photo:     user.photoURL || '',
          joined:    new Date().toLocaleDateString(),
          orders:    0,
          wishlist:  [],
          quizDone:  false
        });
      }
    }

    // ── Email Login ──
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value.trim();
      const btn   = document.getElementById('loginBtn');
      const spin  = document.getElementById('loginSpinner');
      const txt   = document.getElementById('loginBtnText');

      if (!email || !pass) {
        showError('Please fill in all fields'); return;
      }

      setLoading(btn, spin, txt, true);
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        showSuccess('Welcome back! Redirecting...');
      } catch (err) {
        setLoading(btn, spin, txt, false);
        if (err.code === 'auth/user-not-found' ||
            err.code === 'auth/wrong-password' ||
            err.code === 'auth/invalid-credential') {
          showError('Incorrect email or password');
        } else {
          showError('Something went wrong. Try again.');
        }
      }
    });

    // ── Email Sign Up ──
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const name  = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass  = document.getElementById('signupPassword').value.trim();
      const btn   = document.getElementById('signupBtn');
      const spin  = document.getElementById('signupSpinner');
      const txt   = document.getElementById('signupBtnText');

      if (!name || !email || !pass) {
        showError('Please fill in all fields'); return;
      }
      if (pass.length < 6) {
        showError('Password must be at least 6 characters'); return;
      }

      setLoading(btn, spin, txt, true);
      try {
        const result = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(result.user, { displayName: name });
        await saveUserToFirestore(result.user, name);
        showSuccess('Account created! Welcome to Haba Perfumes 🌹');
      } catch (err) {
        setLoading(btn, spin, txt, false);
        if (err.code === 'auth/email-already-in-use') {
          showError('This email is already registered. Sign in instead.');
        } else {
          showError('Something went wrong. Try again.');
        }
      }
    });

    // ── Google Sign In/Up ──
    async function googleAuth() {
      // Mobile Safari blocks popups — use redirect on mobile
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      if (isMobile) {
        try {
          await signInWithRedirect(auth, provider);
          // Page will reload — result handled by getRedirectResult above
        } catch (err) {
          showError('Google sign in failed. Try again.');
        }
        return;
      }

      // Desktop — use popup with redirect fallback
      try {
        const result = await signInWithPopup(auth, provider);
        await saveUserToFirestore(result.user);
        showSuccess('Welcome! Redirecting...');
      } catch (err) {
        if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
          try { await signInWithRedirect(auth, provider); }
          catch (e) { showError('Google sign in failed. Try again.'); }
        } else if (err.code !== 'auth/cancelled-popup-request') {
          showError('Google sign in failed. Try again.');
        }
      }
    }

    document.getElementById('googleLoginBtn').addEventListener('click', googleAuth);
    document.getElementById('googleSignupBtn').addEventListener('click', googleAuth);

    // ── Enter key ──
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('formLogin').classList.contains('active')) {
        document.getElementById('loginBtn').click();
      } else {
        document.getElementById('signupBtn').click();
      }
    });
  </script>
</body>
</html>
