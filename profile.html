<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Haba Perfumes — My Profile</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <script src="js/theme.js" defer></script>
  <style>
    /* ══════════════════════════════
       SILVER THEME — PROFILE PAGE
    ══════════════════════════════ */
    :root {
      --silver:        #C8C8D0;
      --silver-light:  #E8E8F0;
      --silver-dim:    #8A8A98;
      --charcoal:      #0E0E12;
      --charcoal-mid:  #1A1A22;
      --charcoal-card: #141418;
      --white-pure:    #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--charcoal);
      color: var(--silver-light);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      background: rgba(14,14,18,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(200,200,208,0.08);
    }
    .navbar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 300;
      letter-spacing: 0.18em; color: var(--white-pure);
      text-transform: uppercase;
    }
    .navbar-logo span {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem; letter-spacing: 0.28em;
      color: var(--silver-dim); text-transform: lowercase; margin-left: 4px;
    }
    .nav-back {
      background: none; border: none;
      color: var(--silver); font-size: 1rem;
      cursor: pointer; padding: 4px;
      transition: color 0.2s ease;
    }
    .nav-back:hover { color: var(--white-pure); }

    /* ── PAGE ── */
    .profile-page { min-height: 100vh; position: relative; }
    .profile-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%,
          rgba(200,200,208,0.07) 0%, transparent 60%),
        #0E0E12;
    }
    .profile-bg::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg, transparent, transparent 120px,
        rgba(200,200,208,0.012) 120px,
        rgba(200,200,208,0.012) 121px
      );
    }

    /* ── HERO ── */
    .profile-hero {
      position: relative; z-index: 1;
      padding: 90px 24px 24px; text-align: center;
    }
    .profile-avatar-wrap {
      position: relative; width: 90px; height: 90px;
      margin: 0 auto 16px;
    }
    .profile-avatar {
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300;
      color: var(--white-pure); overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 300;
      color: var(--white-pure); margin-bottom: 4px;
    }
    .profile-email {
      font-size: 0.72rem; color: var(--silver-dim);
      letter-spacing: 0.10em; margin-bottom: 6px;
    }
    .profile-joined {
      font-size: 0.65rem; color: var(--silver-dim);
      letter-spacing: 0.08em;
    }
    .profile-method {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      font-size: 0.62rem; color: var(--silver-dim);
      letter-spacing: 0.10em; text-transform: uppercase;
      margin-top: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* ── STATS ── */
    .profile-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 0 24px 24px;
      position: relative; z-index: 1;
    }
    .profile-stat {
      background: var(--charcoal-card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px; padding: 16px 10px; text-align: center;
      position: relative; overflow: hidden;
    }
    .profile-stat::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg,
        transparent, rgba(255,255,255,0.12), transparent);
    }
    .profile-stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 300;
      color: var(--white-pure); line-height: 1; margin-bottom: 4px;
    }
    .profile-stat-label {
      font-size: 0.58rem; color: var(--silver-dim);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* ── BODY ── */
    .profile-body {
      position: relative; z-index: 1;
      padding: 0 24px; padding-bottom: 120px;
    }

    /* ── CARD ── */
    .profile-card {
      background: var(--charcoal-card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 22px; overflow: hidden;
      margin-bottom: 14px; position: relative;
    }
    .profile-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg,
        transparent, rgba(255,255,255,0.12), transparent);
    }
    .profile-card-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .profile-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 300; color: var(--white-pure);
      display: flex; align-items: center; gap: 10px;
    }
    .profile-card-title i { color: var(--silver-dim); font-size: 0.85rem; }
    .profile-card-body { padding: 20px; }

    /* ── FORM ── */
    .field-group { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 0.62rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--silver-dim); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; padding: 13px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px; color: var(--silver-light);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem; outline: none;
      transition: all 0.3s ease;
    }
    .field-input:focus {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.07);
    }
    .field-input:disabled { opacity: 0.40; cursor: not-allowed; }
    .field-input::placeholder { color: rgba(200,200,208,0.28); }

    /* ── SAVE BUTTON ── */
    .save-field-btn {
      width: 100%; padding: 14px;
      background: var(--white-pure);
      border: none; border-radius: 999px;
      color: var(--charcoal);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 16px;
      box-shadow: 0 4px 20px rgba(255,255,255,0.10);
    }
    .save-field-btn:hover { transform: scale(0.98); }
    .save-field-btn:disabled { opacity: 0.50; pointer-events: none; }

    /* ── MESSAGES ── */
    .field-msg {
      font-size: 0.68rem; letter-spacing: 0.08em;
      margin-top: 8px; display: none;
      padding: 8px 14px; border-radius: 12px;
    }
    .field-msg.success {
      display: block; color: #4ecb9e;
      background: rgba(40,180,120,0.08);
      border: 1px solid rgba(40,180,120,0.18);
    }
    .field-msg.error {
      display: block; color: #ff6b6b;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.18);
    }

    /* ── ORDER HISTORY ── */
    .order-item {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center;
      justify-content: space-between; gap: 14px;
    }
    .order-item:last-child { border-bottom: none; }
    .order-item-id {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem; color: var(--white-pure); margin-bottom: 3px;
    }
    .order-item-date {
      font-size: 0.62rem; color: var(--silver-dim); letter-spacing: 0.05em;
    }
    .order-item-total {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; color: var(--white-pure);
      text-align: right; flex-shrink: 0;
    }
    .order-item-status {
      font-size: 0.58rem; color: var(--silver-dim);
      letter-spacing: 0.10em; text-transform: uppercase;
      text-align: right; margin-top: 3px;
    }
    .no-orders {
      text-align: center; padding: 32px 20px;
      color: var(--silver-dim); font-size: 0.78rem;
    }
    .no-orders a {
      color: var(--white-pure); font-size: 0.72rem;
      letter-spacing: 0.08em; display: block; margin-top: 10px;
    }

    /* ── LOGOUT ── */
    .logout-card-btn {
      width: 100%; padding: 15px;
      background: rgba(255,80,80,0.07);
      border: 1px solid rgba(255,80,80,0.18);
      border-radius: 999px; color: rgba(255,120,120,0.85);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .logout-card-btn:hover {
      background: rgba(255,80,80,0.14);
      border-color: rgba(255,80,80,0.35);
      color: rgba(255,120,120,1);
    }

    /* ── TOAST ── */
    .profile-toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(14,14,18,0.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 12px 24px;
      font-size: 0.78rem; color: var(--silver-light);
      letter-spacing: 0.06em; z-index: 2000; opacity: 0;
      transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      white-space: nowrap; pointer-events: none;
    }
    .profile-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-around;
      padding: 12px 0 22px;
      background: rgba(14,14,18,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(200,200,208,0.07);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 4px 14px; border-radius: 12px;
      transition: all 0.2s ease; text-decoration: none; color: var(--silver-dim);
    }
    .nav-item:hover, .nav-item.active { color: var(--white-pure); }
    .nav-item i { font-size: 1.05rem; }
    .nav-label { font-size: 0.55rem; font-weight: 500; letter-spacing: 0.10em; text-transform: uppercase; }
    .nav-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--silver-light); margin-top: 2px; opacity: 0; transition: opacity 0.2s ease; }
    .nav-item.active .nav-dot { opacity: 1; }

    /* ── DIVIDER ── */
    .section-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,200,208,0.10), transparent);
      margin: 4px 0;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="nav-back" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <div class="navbar-logo">HABA <span>perfumes</span></div>
    <div style="width:24px;"></div>
  </nav>

  <!-- Toast -->
  <div class="profile-toast" id="profileToast"></div>

  <div class="profile-page">
    <div class="profile-bg"></div>

    <!-- HERO -->
    <div class="profile-hero">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">
          <span id="profileInitials">?</span>
        </div>
      </div>
      <h1 class="profile-name" id="profileName">Loading...</h1>
      <p class="profile-email" id="profileEmail"></p>
      <p class="profile-joined" id="profileJoined"></p>
      <div class="profile-method" id="profileMethod">
        <i class="fa-solid fa-circle-user"></i>
        <span>Email Account</span>
      </div>
    </div>

    <!-- STATS -->
    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-value" id="statOrders">0</div>
        <div class="profile-stat-label">Orders</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value" id="statWishlist">0</div>
        <div class="profile-stat-label">Saved</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value" id="statQuiz">—</div>
        <div class="profile-stat-label">Quiz</div>
      </div>
    </div>

    <!-- BODY -->
    <div class="profile-body">

      <!-- Edit Name -->
      <div class="profile-card">
        <div class="profile-card-header">
          <div class="profile-card-title">
            <i class="fa-solid fa-pen"></i> Edit Name
          </div>
        </div>
        <div class="profile-card-body">
          <div class="field-group">
            <label class="field-label">Full Name</label>
            <input type="text" class="field-input" id="editName"
              placeholder="Your full name" />
          </div>
          <div class="field-msg" id="nameMsg"></div>
          <button class="save-field-btn" id="saveNameBtn">
            <i class="fa-solid fa-floppy-disk"></i> Save Name
          </button>
        </div>
      </div>

      <!-- Change Password -->
      <div class="profile-card">
        <div class="profile-card-header">
          <div class="profile-card-title">
            <i class="fa-solid fa-lock"></i> Change Password
          </div>
        </div>
        <div class="profile-card-body">
          <div class="field-group">
            <label class="field-label">Current Password</label>
            <input type="password" class="field-input"
              id="currentPass" placeholder="••••••••" />
          </div>
          <div class="field-group">
            <label class="field-label">New Password</label>
            <input type="password" class="field-input"
              id="newPass" placeholder="Min 6 characters" />
          </div>
          <div class="field-group">
            <label class="field-label">Confirm New Password</label>
            <input type="password" class="field-input"
              id="confirmPass" placeholder="••••••••" />
          </div>
          <div class="field-msg" id="passMsg"></div>
          <button class="save-field-btn" id="savePassBtn">
            <i class="fa-solid fa-key"></i> Update Password
          </button>
          <p id="googlePassNote"
            style="display:none;font-size:0.70rem;
            color:var(--silver-dim);text-align:center;margin-top:12px;">
            Password change is not available for Google Sign‑In accounts.
          </p>
        </div>
      </div>

      <!-- Order History -->
      <div class="profile-card">
        <div class="profile-card-header">
          <div class="profile-card-title">
            <i class="fa-solid fa-bag-shopping"></i> Order History
          </div>
          <a href="order-tracking.html"
            style="font-size:0.68rem;color:var(--silver);
            letter-spacing:0.08em;text-decoration:none;
            transition:color 0.2s ease;"
            onmouseover="this.style.color='#fff'"
            onmouseout="this.style.color='var(--silver)'">
            Track →
          </a>
        </div>
        <div id="orderHistory">
          <div class="no-orders">
            <div style="font-size:2rem;margin-bottom:12px;">🛍️</div>
            <p>No orders yet</p>
            <a href="shop.html">Start Shopping →</a>
          </div>
        </div>
      </div>

      <!-- Sign Out -->
      <div class="profile-card">
        <div class="profile-card-header">
          <div class="profile-card-title">
            <i class="fa-solid fa-right-from-bracket"></i> Account
          </div>
        </div>
        <div class="profile-card-body">
          <button class="logout-card-btn" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Sign Out
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span class="nav-label">Home</span><div class="nav-dot"></div>
    </a>
    <a href="shop.html" class="nav-item">
      <i class="fa-solid fa-store"></i>
      <span class="nav-label">Shop</span><div class="nav-dot"></div>
    </a>
    <a href="quiz.html" class="nav-item">
      <i class="fa-solid fa-flask"></i>
      <span class="nav-label">Quiz</span><div class="nav-dot"></div>
    </a>
    <a href="cart.html" class="nav-item">
      <i class="fa-solid fa-bag-shopping"></i>
      <span class="nav-label">Bag</span><div class="nav-dot"></div>
    </a>
    <a href="profile.html" class="nav-item active">
      <i class="fa-solid fa-circle-user"></i>
      <span class="nav-label">Account</span><div class="nav-dot"></div>
    </a>
  </nav>
  <script src="js/main.js"></script>

  <script type="module">
    import {
      auth, db,
      onAuthStateChanged, signOut,
      updateProfile,
      doc, getDoc, setDoc, onSnapshot,
      collection
    } from './js/firebase.js';

    import {
      EmailAuthProvider,
      reauthenticateWithCredential,
      updatePassword
    } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';

    var toastTimer;
    function showToast(msg, isError) {
      var t = document.getElementById('profileToast');
      t.textContent = (isError ? '✕  ' : '✓  ') + msg;
      t.style.color = isError ? '#ff6b6b' : 'var(--silver-light)';
      t.style.borderColor = isError
        ? 'rgba(255,80,80,0.28)'
        : 'rgba(255,255,255,0.12)';
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    function showMsg(id, msg, isError) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'field-msg ' + (isError ? 'error' : 'success');
    }

    function fmtUGX(n) { return 'UGX ' + Number(n).toLocaleString(); }

    // ── Auth guard ──
    onAuthStateChanged(auth, async function(user) {
      if (!user) { window.location.href = 'login.html'; return; }
      loadProfile(user);
      loadOrders(user);
    });

    function loadProfile(user) {
      var avatarEl    = document.getElementById('profileAvatar');
      var initialsEl  = document.getElementById('profileInitials');
      var nameEl      = document.getElementById('profileName');
      var emailEl     = document.getElementById('profileEmail');
      var joinedEl    = document.getElementById('profileJoined');
      var methodEl    = document.getElementById('profileMethod');
      var editNameEl  = document.getElementById('editName');
      var googleNote  = document.getElementById('googlePassNote');
      var savePassBtn = document.getElementById('savePassBtn');

      var isGoogle = user.providerData.some(function(p) {
        return p.providerId === 'google.com';
      });

      // Avatar
      if (user.photoURL) {
        avatarEl.innerHTML = '<img src="' + user.photoURL + '" alt="avatar" />';
      } else {
        var initials = (user.displayName || user.email || 'U')
          .split(' ').map(function(w) { return w[0]; })
          .join('').toUpperCase().slice(0, 2);
        initialsEl.textContent = initials;
      }

      nameEl.textContent  = user.displayName || 'Haba Customer';
      emailEl.textContent = user.email || '';
      editNameEl.value    = user.displayName || '';

      // Method badge
      if (isGoogle) {
        methodEl.innerHTML = '<i class="fa-brands fa-google"></i><span>Google Account</span>';
        googleNote.style.display = 'block';
        if (savePassBtn) savePassBtn.style.display = 'none';
        document.getElementById('currentPass').disabled = true;
        document.getElementById('newPass').disabled     = true;
        document.getElementById('confirmPass').disabled = true;
      }

      // Firestore doc
      getDoc(doc(db, 'users', user.uid)).then(function(snap) {
        if (snap.exists()) {
          var data = snap.data();
          joinedEl.textContent = 'Member since ' + (data.joined || '');
          document.getElementById('statOrders').textContent  = data.orders || 0;
          document.getElementById('statWishlist').textContent = (data.wishlist || []).length;
          document.getElementById('statQuiz').textContent    = data.quizDone ? '✓' : '✕';
        }
      });
    }

    // ── Orders ──
    function loadOrders(user) {
      var historyEl = document.getElementById('orderHistory');
      var countEl   = document.querySelector('[href="order-tracking.html"]');

      onSnapshot(collection(db, 'orders'), function(snapshot) {
        var orders = [];
        snapshot.forEach(function(d) {
          var data = d.data();
          if (data.uid === user.uid) orders.push(data);
        });
        orders.sort(function(a, b) {
          return (b.id || '').localeCompare(a.id || '');
        });

        document.getElementById('statOrders').textContent = orders.length;
        setDoc(doc(db, 'users', user.uid), { orders: orders.length }, { merge: true });

        if (orders.length === 0) {
          historyEl.innerHTML =
            '<div class="no-orders">' +
              '<div style="font-size:2rem;margin-bottom:12px;">🛍️</div>' +
              '<p>No orders yet</p>' +
              '<a href="shop.html">Start Shopping →</a>' +
            '</div>';
          return;
        }

        historyEl.innerHTML = orders.slice(0, 8).map(function(o) {
          var statusColor =
            o.status === 'new'        ? 'var(--silver-dim)' :
            o.status === 'processing' ? '#60a5fa' : '#4ecb9e';
          return '<div class="order-item">' +
            '<div>' +
              '<div class="order-item-id">' + (o.id || '') + '</div>' +
              '<div class="order-item-date">' + (o.date || '') + '</div>' +
            '</div>' +
            '<div>' +
              '<div class="order-item-total">' + fmtUGX(o.total || 0) + '</div>' +
              '<div class="order-item-status" style="color:' + statusColor + ';">' +
                (o.status || '') +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');
      });
    }

    // ── Save Name ──
    document.getElementById('saveNameBtn').addEventListener('click', async function() {
      var user    = auth.currentUser;
      var newName = document.getElementById('editName').value.trim();
      if (!newName) { showMsg('nameMsg', 'Please enter your name', true); return; }
      this.disabled = true;
      try {
        await updateProfile(user, { displayName: newName });
        await setDoc(doc(db, 'users', user.uid), { name: newName }, { merge: true });
        document.getElementById('profileName').textContent = newName;
        showMsg('nameMsg', 'Name updated!', false);
        showToast('Name saved!');
      } catch(err) {
        showMsg('nameMsg', 'Failed to update. Try again.', true);
      }
      this.disabled = false;
    });

    // ── Change Password ──
    var savePassBtn = document.getElementById('savePassBtn');
    if (savePassBtn) {
      savePassBtn.addEventListener('click', async function() {
        var user    = auth.currentUser;
        var current = document.getElementById('currentPass').value;
        var newPass = document.getElementById('newPass').value;
        var confirm = document.getElementById('confirmPass').value;

        if (!current || !newPass || !confirm) {
          showMsg('passMsg', 'Please fill in all fields', true); return;
        }
        if (newPass.length < 6) {
          showMsg('passMsg', 'Password must be at least 6 characters', true); return;
        }
        if (newPass !== confirm) {
          showMsg('passMsg', 'Passwords do not match', true); return;
        }

        this.disabled = true;
        try {
          var credential = EmailAuthProvider.credential(user.email, current);
          await reauthenticateWithCredential(user, credential);
          await updatePassword(user, newPass);
          showMsg('passMsg', 'Password updated!', false);
          showToast('Password changed!');
          document.getElementById('currentPass').value = '';
          document.getElementById('newPass').value     = '';
          document.getElementById('confirmPass').value = '';
        } catch(err) {
          if (err.code === 'auth/wrong-password' ||
              err.code === 'auth/invalid-credential') {
            showMsg('passMsg', 'Current password is incorrect', true);
          } else {
            showMsg('passMsg', 'Failed to update. Try again.', true);
          }
        }
        this.disabled = false;
      });
    }

    // ── Logout ──
    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await signOut(auth);
      localStorage.removeItem('habaCart');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
